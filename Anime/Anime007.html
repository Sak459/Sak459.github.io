<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantilla Anime Zone</title>

<style>
:root{
  --bg:#000;
  --accent:#ff3c78;
  --card:#1a1a1a;
  --text:#fff;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:5px;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* HEADER */
.header-fixed{
  width:100%;
  max-width:1000px;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* BANNER */
.banner-top{
  width:100%;
  height:85px;
  object-fit:cover;
  border-radius:6px;
  margin-bottom:10px;
}

/* ACCIONES */
.series-actions{
  display:flex;
  gap:24px;
  margin-bottom:6px;
}

.action-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:90px;
  padding:4px;
  border-radius:12px;
  background:#111;
  cursor:pointer;
  font-size:.75rem;
  color:#bbb;
  transition:.2s;
}

.action-btn svg{
  width:22px;
  height:22px;
  fill:currentColor;
}

.action-btn.active{
  background:var(--accent);
  color:#fff;
}

/* TEXTOS */
header{
  font-size:1.4rem;
  font-weight:bold;
  color:var(--accent);
  margin-bottom:4px;
  text-align:center;
}

#episodeTitle{
  font-size:1rem;
  margin-bottom:8px;
}

/* PLAYER */
.player-container{
  display:none;
  width:100%;
  max-width:1000px;
  aspect-ratio:16/9;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* EPISODIOS */
.scroll-episodes{
  width:100%;
  max-width:1000px;
  flex-grow:1;
  overflow-y:auto;
  padding:8px;
}

.episode-list{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.episode{
  background:var(--card);
  border-radius:14px;
  min-height:40px;
  background-size:cover;
  background-position:center;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  position:relative;
}

.episode::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.55);
  border-radius:14px;
}

.episode span{
  position:relative;
  z-index:2;
}

.episode.active,
.episode.last-watched{
  outline:2px solid var(--accent);
}

/* MODO LANDSCAPE */
.landscape-mode{
  position:fixed !important;
  inset:0;
  width:100vh !important;
  height:100vw !important;
  background:#000;
  z-index:999999;

  transform:
    rotate(90deg)
    translateY(-100%);

  transform-origin:top left;
}

/* IFRAME */
.landscape-mode iframe{
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="header-fixed">

  <img class="banner-top" src="https://image.tmdb.org/t/p/original/qpBiukaymRk7GmqU5ed6a3NA1Zt.jpg">

  <div class="series-actions">

    <!-- FAVORITOS -->
    <div class="action-btn" id="favoriteBtn">
      ❤️
      Favoritos
    </div>

    <!-- FINALIZADA -->
    <div class="action-btn" id="watchedBtn">
      ✔
      Finalizada
    </div>

  </div>

  <header>Overlord Movie 3: Sei Oukoku-hen</header>
  <div id="episodeTitle">Selecciona un episodio</div>
  <div class="player-container" id="player-container"></div>
</div>

<div class="scroll-episodes">
  <section class="episode-list" id="episodeList"></section>
</div>

<script>
/* ================= CONFIG ================= */
const seriesId = '1014505';

const seriesData = {
  id: seriesId,
  title: 'Overlord Movie 3: Sei Oukoku-hen',
  banner: 'https://image.tmdb.org/t/p/original/qpBiukaymRk7GmqU5ed6a3NA1Zt.jpg'
};

const episodes = [
  {
    url:'https://rakuplayer.blogspot.com/?url=U2FsdGVkX19Lsrd%2FVKHVmSDs2gNIRFwqDVz6hFaR29mLYJ3tTJlfZ3ttMVTQTakrt4dB88aXQYqn58bnhJOedfbrETwmjcHb7%2B9%2FNA4roKJnjmpPA%2BnSpD1mIM6Q6bUf',
    title:'Episodio 1',
    thumbnail:'https://image.tmdb.org/t/p/original/hkJhGayONXn96CqIRM9GhWKnlCf.jpg'
  },{
    url:'https://ryderjet.com/embed/fvncfv9806dt',
    title:'Episodio 1',
    thumbnail:'https://image.tmdb.org/t/p/original/hkJhGayONXn96CqIRM9GhWKnlCf.jpg'
  }
];

/* ================= ELEMENTOS ================= */
const episodeList = document.getElementById('episodeList');
const episodeTitle = document.getElementById('episodeTitle');
const playerContainer = document.getElementById('player-container');
const favBtn = document.getElementById('favoriteBtn');
const watchedBtn = document.getElementById('watchedBtn');

/* ================= STORAGE ================= */
const getList = k => JSON.parse(localStorage.getItem(k)) || [];
const saveList = (k,v) => localStorage.setItem(k, JSON.stringify(v));

/* ================= FAVORITOS ================= */
function isFavorite(){
  return getList('favorites').some(s => s.id === seriesId);
}

function toggleFavorite(){
  let favs = getList('favorites');
  if(isFavorite()){
    favs = favs.filter(s => s.id !== seriesId);
    favBtn.classList.remove('active');
  }else{
    favs.push(seriesData);
    favBtn.classList.add('active');
  }
  saveList('favorites', favs);
}

/* ================= FINALIZADA ================= */
function toggleWatched(){
  let list = getList('watched');
  if(list.includes(seriesId)){
    list = list.filter(id => id !== seriesId);
    watchedBtn.classList.remove('active');
  }else{
    list.push(seriesId);
    watchedBtn.classList.add('active');
  }
  saveList('watched', list);
}

/* ================= EPISODIOS ================= */
let currentEpisode = localStorage.getItem(seriesId+'_lastEpisode');
currentEpisode = currentEpisode !== null ? parseInt(currentEpisode) : null;

episodes.forEach((ep,i)=>{
  const div = document.createElement('div');
  div.className='episode';
  div.style.backgroundImage=`url(${ep.thumbnail})`;
  div.innerHTML=`<span>${ep.title}</span>`;
  div.onclick=()=>loadEpisode(i);
  episodeList.appendChild(div);
});

function loadEpisode(i){
  currentEpisode=i;
  episodeTitle.textContent=episodes[i].title;
  playerContainer.style.display='block';
  playerContainer.innerHTML=`<iframe src="${episodes[i].url}" allowfullscreen></iframe>`;
  localStorage.setItem(seriesId+'_lastEpisode',i);
  updateUI();
  enterLandscapeMode();
}

function updateUI(){
  document.querySelectorAll('.episode').forEach((e,idx)=>{
    e.classList.toggle('active',idx===currentEpisode);
    e.classList.toggle('last-watched',idx===currentEpisode);
  });
}

/* ================= FULLSCREEN ================= */
function enterFullscreen(){
  if(playerContainer.requestFullscreen) playerContainer.requestFullscreen();
}

document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement){
    playerContainer.style.display='none';
    playerContainer.innerHTML='';
  }
});

/* ================= INIT ================= */
if(isFavorite()) favBtn.classList.add('active');
if(getList('watched').includes(seriesId)) watchedBtn.classList.add('active');

favBtn.onclick = toggleFavorite;
watchedBtn.onclick = toggleWatched;

if(currentEpisode!==null && episodes[currentEpisode]){
  episodeTitle.textContent=episodes[currentEpisode].title;
  updateUI();
  setTimeout(()=>{
    document.querySelectorAll('.episode')[currentEpisode]
      ?.scrollIntoView({behavior:'smooth',block:'center'});
  },300);
}
</script>
<script>
/* BLOQUEAR POPUPS */
window.open = function () {
  return null;
};

/* BLOQUEAR REDIRECCIONES */
const blockedDomains = [
  "doubleclick.net",
  "googlesyndication.com",
  "adservice.google.com",
  "popads.net",
  "adsterra.com",
  "propellerads.com"
];

function isBlocked(url) {
  return blockedDomains.some(domain => url.includes(domain));
}

/* BLOQUEAR LINKS */
document.addEventListener("click", e => {
  const link = e.target.closest("a");

  if (link && isBlocked(link.href)) {
    e.preventDefault();
    console.log("Anuncio bloqueado:", link.href);
  }
}, true);

/* BLOQUEAR IFRAMES PUBLICITARIOS */
const observer = new MutationObserver(() => {
  document.querySelectorAll("iframe").forEach(frame => {
    try {
      const src = frame.src || "";

      if (isBlocked(src)) {
        frame.remove();
        console.log("Iframe bloqueado:", src);
      }
    } catch(err){}
  });
});

observer.observe(document.documentElement, {
  childList: true,
  subtree: true
});
</script>
<script>
/* =========================================
   AUTO LANDSCAPE HTML PLAYER
========================================= */

async function enterPlayerMode(playerElement){

  try{

    /* FULLSCREEN */
    if(playerElement.requestFullscreen){
      await playerElement.requestFullscreen();
    }

    /* GIRAR HORIZONTAL */
    if(screen.orientation &&
       screen.orientation.lock){

      await screen.orientation
        .lock("landscape");
    }

  }catch(err){
    console.log("No compatible", err);
  }

}

/* =========================================
   VOLVER A VERTICAL
========================================= */

async function exitPlayerMode(){

  try{

    if(screen.orientation &&
       screen.orientation.unlock){

      screen.orientation.unlock();

    }else if(
      screen.orientation &&
      screen.orientation.lock
    ){

      await screen.orientation
        .lock("portrait");
    }

  }catch(err){}

}

/* =========================================
   DETECTAR SALIDA FULLSCREEN
========================================= */

document.addEventListener(
  "fullscreenchange",
  ()=>{

    if(!document.fullscreenElement){

      exitPlayerMode();

    }

  }
);
</script>
<script>
/* =====================================
   ACTIVAR LANDSCAPE VISUAL
===================================== */

function enterLandscapeMode(){

  playerContainer.classList.add(
    "landscape-mode"
  );

  /* fullscreen */
  if(playerContainer.requestFullscreen){
    playerContainer.requestFullscreen()
      .catch(()=>{});
  }

}

/* =====================================
   SALIR LANDSCAPE
===================================== */

function exitLandscapeMode(){

  playerContainer.classList.remove(
    "landscape-mode"
  );

}

/* =====================================
   DETECTAR SALIDA FULLSCREEN
===================================== */

document.addEventListener(
  "fullscreenchange",
  ()=>{

    if(!document.fullscreenElement){

      exitLandscapeMode();

    }

  }
);
</script>
</body>
</html>
