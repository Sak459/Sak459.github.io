<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantilla Rakuen Hentai</title>

<style>
:root{
  --bg:#000;
  --accent:#ff3c78;
  --card:#1a1a1a;
  --text:#fff;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:5px;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.header-fixed{
  width:100%;
  max-width:1000px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.banner-top{
  width:100%;
  height:185px;
  object-fit:cover;
  border-radius:6px;
  margin-bottom:10px;
}

.series-actions{
  display:flex;
  gap:24px;
  margin-bottom:6px;
}

.action-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:90px;
  padding:8px;
  border-radius:12px;
  background:#111;
  cursor:pointer;
  font-size:.75rem;
  color:#bbb;
  transition:.2s;
}

.action-btn.active{
  background:var(--accent);
  color:#fff;
}

header{
  font-size:1.4rem;
  font-weight:bold;
  color:var(--accent);
  margin-bottom:4px;
  text-align:center;
}

#episodeTitle{
  font-size:1rem;
  margin-bottom:8px;
}

.scroll-episodes{
  width:95%;
  max-width:1000px;
  flex-grow:1;
  overflow-y:auto;
  padding:8px;
}

.episode-list{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.episode{
  background:var(--card);
  border-radius:14px;
  min-height:40px;
  background-size:cover;
  background-position:center;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  position:relative;
}

.episode::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.55);
  border-radius:14px;
}

.episode span{
  position:relative;
  z-index:2;
}

.episode.active,
.episode.last-watched{
  outline:2px solid var(--accent);
}
</style>
</head>

<body>

<div class="header-fixed">

  <img class="banner-top" src="https://image.tmdb.org/t/p/original/ynPmddHxp9buHiU5ceRBeNiccY4.jpg">

  <div class="series-actions">
    <div class="action-btn" id="favoriteBtn">❤️ Favoritos</div>
    <div class="action-btn" id="watchedBtn">✔ Finalizada</div>
  </div>

  <header>Ane wa Yan Mama Junyuu Chuu Audio Latino</header>
  <div id="episodeTitle">Selecciona un episodio</div>

</div>

<div class="scroll-episodes">
  <section class="episode-list" id="episodeList"></section>
</div>

<script>

/* ================= CONFIG ================= */
const seriesId = 'HenLa001';

const seriesData = {
  id: seriesId,
  title: 'Ane wa Yan Mama Latino',
  banner: 'https://image.tmdb.org/t/p/original/t5hPL0gOoTyBFPvzdefPcqEeHx3.jpg'
};

const episodes = [
  { url: 'https://files.catbox.moe/spum1o.mp4', title: 'Episodio 1', thumbnail: 'https://image.tmdb.org/t/p/original/pqddn8Kh7kcfM8DhLd3K5Y7Jens.jpg' },
  { url: 'https://files.catbox.moe/7rcz9o.mp4', title: 'Episodio 2', thumbnail: 'https://image.tmdb.org/t/p/original/7RqEAWh9liDsM2dTuwFwgwx5XUa.jpg' }
];

/* ================= ELEMENTOS ================= */
const episodeList = document.getElementById('episodeList');
const episodeTitle = document.getElementById('episodeTitle');
const favBtn = document.getElementById('favoriteBtn');
const watchedBtn = document.getElementById('watchedBtn');

/* ================= STORAGE ================= */
const getList = k => JSON.parse(localStorage.getItem(k)) || [];
const saveList = (k,v) => localStorage.setItem(k, JSON.stringify(v));

/* ================= FAVORITOS ================= */
function isFavorite(){
  return getList('favorites').some(s => s.id === seriesId);
}

function toggleFavorite(){
  let favs = getList('favorites');
  if(isFavorite()){
    favs = favs.filter(s => s.id !== seriesId);
    favBtn.classList.remove('active');
  }else{
    favs.push(seriesData);
    favBtn.classList.add('active');
  }
  saveList('favorites', favs);
}

/* ================= FINALIZADA ================= */
function toggleWatched(){
  let list = getList('watched');
  if(list.includes(seriesId)){
    list = list.filter(id => id !== seriesId);
    watchedBtn.classList.remove('active');
  }else{
    list.push(seriesId);
    watchedBtn.classList.add('active');
  }
  saveList('watched', list);
}

/* ================= EPISODIOS ================= */
let currentEpisode = localStorage.getItem(seriesId+'_lastEpisode');
currentEpisode = currentEpisode !== null ? parseInt(currentEpisode) : null;

episodes.forEach((ep,i)=>{
  const div = document.createElement('div');
  div.className='episode';
  div.style.backgroundImage=`url(${ep.thumbnail})`;
  div.innerHTML=`<span>${ep.title}</span>`;
  div.onclick=()=>loadEpisode(i);
  episodeList.appendChild(div);
});

function loadEpisode(i){
  currentEpisode = i;
  episodeTitle.textContent = episodes[i].title;

  // 🔥 Enviar URL a Android para ExoPlayer
  if(window.Android){
      Android.enviarVideo(episodes[i].url);
  }

  localStorage.setItem(seriesId + '_lastEpisode', i);
  updateUI();
}

function updateUI(){
  document.querySelectorAll('.episode').forEach((e,idx)=>{
    e.classList.toggle('active',idx===currentEpisode);
    e.classList.toggle('last-watched',idx===currentEpisode);
  });
}

/* ================= INIT ================= */
if(isFavorite()) favBtn.classList.add('active');
if(getList('watched').includes(seriesId)) watchedBtn.classList.add('active');

favBtn.onclick = toggleFavorite;
watchedBtn.onclick = toggleWatched;

if(currentEpisode!==null && episodes[currentEpisode]){
  episodeTitle.textContent=episodes[currentEpisode].title;
  updateUI();
  setTimeout(()=>{
    document.querySelectorAll('.episode')[currentEpisode]
      ?.scrollIntoView({behavior:'smooth',block:'center'});
  },300);
}

</script>
</body>
</html>
