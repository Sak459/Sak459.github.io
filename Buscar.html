<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buscador</title>
  <style>
    :root {
      --bg-color: #0e0e0e;
      --card-color: #000000;
      --text-color: #f0f0f0;
      --highlight-color: #ff375e;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #000000;
      color: var(--text-color);
      min-height: 100vh;
    }

    header {
      background-color: #000000;
      color: var(--text-color);
      text-align: center;
      padding: 2rem 1rem 1rem;
      box-shadow: var(--shadow);
    }

    header h1 {
      font-size: 2.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .buscador {
      margin-bottom: 1rem;
    }

    .buscador input {
      padding: 12px 15px;
      width: 420px;
      max-width: 90%;
      font-size: 1.1rem;
      border-radius: 8px;
      background-color: #1e1e1e;
      border: 1px solid #333;
      color: var(--text-color);
      outline: none;
      transition: all 0.3s ease;
    }

    .buscador input:focus {
      border-color: var(--highlight-color);
      box-shadow: 0 0 8px var(--highlight-color);
    }

    .filtro-letras {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 5px;
      margin-bottom: 1.5rem;
    }

    .filtro-letras button {
      background-color: #222;
      border: 1px solid #333;
      color: var(--text-color);
      padding: 7px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background-color 0.2s ease;
    }

    .filtro-letras button:hover,
    .filtro-letras button.activa {
      background-color: var(--highlight-color);
      color: white;
    }

    .catalogo {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
      gap: 5px;
      padding: 10px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .serie {
      background-color: var(--card-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .poster a {
      display: block;
      width: 100%;
      height: 185px; /* Mantener la altura fija */
      overflow: hidden;
    }

    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .poster img:hover {
      transform: scale(1.04);
    }

    .titulo-serie {
      padding: 6px;
      text-align: center;
      background-color: #000000;
      color: #ffffff;
      font-size: 0.6rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #mensaje-vacio {
      text-align: center;
      font-size: 1.2rem;
      padding: 2rem;
      color: #aaa;
      display: none;
    }
    
    /* Animación suave de entrada */
    .serie {
      animation: fadeIn 0.85s ease;
    }

    @keyframes fadeIn {
    from {
      opacity: 0;
      transform: scale(0.96);
    }
    to {
      opacity: 1;
      transform: scale(1);
       }
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #1f1f1f;
      border-radius: 16px;
      padding: 35px 30px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      transform: translateY(30px);
      opacity: 0;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
      opacity: 1;
    }

    .modal h2 {
      margin: 0;
      color: #ff4d4d;
      font-size: 22px;
    }

    .modal p {
      font-size: 16px;
      margin: 15px 0;
      color: #ccc;
    }

    .modal ul {
      text-align: left;
      margin: 10px 0 0 0;
      padding-left: 20px;
      color: #999;
      font-size: 14px;
    }

    .modal button {
      margin-top: 20px;
      padding: 12px 24px;
      background-color: #ff4d4d;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #28a745;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 10000;
    }

    .toast.show {
      opacity: 1;
      pointer-events: auto;
    }
    
    /* Quita resaltado azul y menú táctil */
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    /* Bloqueo de selección y arrastre */
    body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    img {
      -webkit-user-drag: none;
      user-drag: none;
      pointer-events: none;
    }
  
  .ordenar {
  text-align: center;
  margin-bottom: 1rem;
}

.ordenar button {
  background-color: #222;
  border: 1px solid #333;
  color: var(--text-color);
  padding: 6px 12px;
  margin: 0 5px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: background-color 0.2s ease;
}

.ordenar button:hover,
.ordenar button.activo {
  background-color: var(--highlight-color);
  color: white;
}

#btnReset {
  background-color: #222;
  border: 1px solid #333;
  color: var(--text-color);
  padding: 6px 12px;
  margin: 0 5px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.9rem;
  display: inline-flex;
  align-items: center;
  transition: background-color 0.2s ease;
}

#btnReset:hover {
  background-color: var(--highlight-color);
  color: white;
}

    /* Media Queries para pantallas más pequeñas */
    @media (max-width: 788px) {
      .catalogo {
        grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
      }

      header h1 {
        font-size: 1.5rem;
      }

      .buscador input {
        width: 90%;
      }

      .titulo-serie {
        font-size: 0.5rem;
      }
    }

    @media (max-width: 400px) {
      .catalogo {
        grid-template-columns: 1fr; /* Una sola columna en móviles */
      }
    }
    
    /* LOADER */
#loading{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    transition:opacity .35s ease;
}

#loading.hide{
    opacity:0;
    pointer-events:none;
}

.loader{
    width:80px;
    height:80px;
    border:4px solid rgba(255,255,255,.15);
    border-top:4px solid #ff375e;
    border-radius:50%;
    animation:girar .8s linear infinite;
}

@keyframes girar{
    to{
        transform:rotate(360deg);
    }
}
  </style>
</head>

<script>
const API_KEY = "b6083b855479a79fd9acdb0a2789f126";
const TMDB = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/w500";
const inputBusqueda = document.getElementById("inputBusqueda");
const series = Array.from(document.querySelectorAll(".serie"));
const mensajeVacio = document.getElementById("mensaje-vacio");
const filtroLetras = document.getElementById("filtroLetras");
const catalogo = document.getElementById("catalogo");
const loading = document.getElementById("loading");

async function cargarTMDB(){

    const tarjetas = document.querySelectorAll(".serie");

    const promesas = [];

    tarjetas.forEach(async tarjeta=>{

        const id = tarjeta.dataset.id;
        const tipo = tarjeta.dataset.tipo;

        if(!id || !tipo) return;

        const url =
        `${TMDB}/${tipo}/${id}?api_key=${API_KEY}&language=es-ES`;

        const p = fetch(url)
        .then(r=>r.json())
        .then(datos=>{

            // Nombre personalizado (si existe)
const tituloManual = tarjeta.dataset.nombre?.trim();

// Si no existe, usar TMDB
const titulo =
    tituloManual ||
    datos.title ||
    datos.name ||
    "Sin título";

// Guardar el nombre completo para buscador y orden
tarjeta.dataset.nombre = titulo;

// Mostrar título recortado
const tituloMostrar =
    titulo.length > 30
        ? titulo.substring(0,30).trim() + "..."
        : titulo;

tarjeta.querySelector(".titulo-serie").textContent = tituloMostrar;

// El póster sigue viniendo de TMDB
const img = tarjeta.querySelector("img");

// Poster personalizado (si existe)
const posterManual = tarjeta.dataset.poster?.trim();

img.src =
    posterManual ||
    (datos.poster_path ? IMG + datos.poster_path : "");

img.alt = titulo;

        });

        promesas.push(p);

    });

    await Promise.all(promesas);

}

function showLoading() {
    loading.classList.remove("hide");
}

function hideLoading() {
    loading.classList.add("hide");
}


const LIMITE_INICIAL = 240;
let modoInicial = true;
let filtroLetraActiva = '';
let ordenActual = '';

// ================== FILTRO A-Z ==================
const letras = ['#', ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')];

letras.forEach(letra => {
  const btn = document.createElement('button');
  btn.textContent = letra;
  btn.dataset.letra = letra;

  btn.addEventListener('click', () => {
    modoInicial = false;
    filtroLetraActiva = letra;

    document.querySelectorAll('.filtro-letras button')
      .forEach(b => b.classList.remove('activa'));
    btn.classList.add('activa');

    aplicarFiltros();
  });

  filtroLetras.appendChild(btn);
});

// ================== BUSCADOR ==================
inputBusqueda.addEventListener("input", () => {
  modoInicial = false;
  aplicarFiltros();
});

// ================== ORDEN ==================
const btnAsc = document.getElementById('ordenAsc');
const btnDesc = document.getElementById('ordenDesc');
const btnReset = document.getElementById('btnReset');

btnAsc.addEventListener('click', () => {
  modoInicial = false;
  ordenActual = 'asc';
  btnAsc.classList.add('activo');
  btnDesc.classList.remove('activo');
  aplicarFiltros();
});

btnDesc.addEventListener('click', () => {
  modoInicial = false;
  ordenActual = 'desc';
  btnDesc.classList.add('activo');
  btnAsc.classList.remove('activo');
  aplicarFiltros();
});

btnReset.addEventListener('click', () => {
  modoInicial = true;
  filtroLetraActiva = '';
  ordenActual = '';
  inputBusqueda.value = '';

  document.querySelectorAll('.filtro-letras button')
    .forEach(b => b.classList.remove('activa'));

  btnAsc.classList.remove('activo');
  btnDesc.classList.remove('activo');

  aplicarFiltros();
});

// ================== FUNCIÓN PRINCIPAL ==================
function aplicarFiltros() {
  const texto = inputBusqueda.value.toLowerCase();
  let visibles = 0;

  let lista = [...series];

  // Ordenar
  if (ordenActual === 'asc') {
    lista.sort((a, b) => a.dataset.nombre.localeCompare(b.dataset.nombre));
  }
  if (ordenActual === 'desc') {
    lista.sort((a, b) => b.dataset.nombre.localeCompare(a.dataset.nombre));
  }

  catalogo.innerHTML = '';

  lista.forEach(serie => {
    const nombre = serie.dataset.nombre;
    const nombreLower = nombre.toLowerCase();
    const letraInicial = nombre.trim().charAt(0).toUpperCase();

    const coincideBusqueda = nombreLower.includes(texto);
    const coincideLetra =
      filtroLetraActiva === '' ||
      (filtroLetraActiva === '#' ? !/[A-Z]/.test(letraInicial) : letraInicial === filtroLetraActiva);

    if (coincideBusqueda && coincideLetra) {
      if (modoInicial && visibles >= LIMITE_INICIAL) return;

      serie.style.display = "flex";
      catalogo.appendChild(serie);
      visibles++;
    }
  });

  mensajeVacio.style.display = visibles === 0 ? "block" : "none";
}

// ================== CARGA INICIAL ==================
(async()=>{

    showLoading();

    await cargarTMDB();

    aplicarFiltros();

    const imagenes =
    document.querySelectorAll(".poster img");

    let cargadas = 0;

    imagenes.forEach(img=>{

        if(img.complete){

            cargadas++;

            if(cargadas===imagenes.length)
                hideLoading();

        }else{

            img.onload =
            img.onerror = ()=>{

                cargadas++;

                if(cargadas===imagenes.length)
                    hideLoading();

            };

        }

    });

})();

let cargadas = 0;

imagenes.forEach(img => {
    if (img.complete) {
        cargadas++;
        if (cargadas === imagenes.length) hideLoading();
    } else {
        img.onload = img.onerror = () => {
            cargadas++;
            if (cargadas === imagenes.length) hideLoading();
        };
    }
});
</script>
<script>
  const modal = document.getElementById("connectionModal");
  const toast = document.getElementById("toast");
  let wasOffline = false;

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }

  function updateConnectionStatus() {
    if (!navigator.onLine) {
      modal.classList.add("active");
      wasOffline = true;
    } else {
      modal.classList.remove("active");
      if (wasOffline) {
        showToast("✅ ¡Conexión restaurada!");
        wasOffline = false;
      }
    }
  }

  window.addEventListener("load", updateConnectionStatus);
  window.addEventListener("offline", updateConnectionStatus);
  window.addEventListener("online", updateConnectionStatus);
</script>
