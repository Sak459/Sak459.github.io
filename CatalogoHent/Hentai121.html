<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantilla Movies</title>

<style>
:root{
  --bg:#000;
  --accent:#ff3c78;
  --card:#1a1a1a;
  --text:#fff;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:5px;
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  user-select:none;
}

img{
  -webkit-user-drag:none;
  user-drag:none;
}

.header-fixed{
  width:100%;
  max-width:1000px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.banner-top{
  width:100%;
  height:205px;
  object-fit:cover;
  border-radius:8px 8px 8px 8px;
}

.poster{
  width:150px;
  border-radius:16px;
  margin-top:-70px;
  z-index:5;
  position:relative;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}

.anime-info{
  width:95%;
  max-width:1000px;
  text-align:center;
  margin-top:10px;
}

#animeTitle{
  font-size:1.6rem;
  margin:8px 0;
}

.meta{
  color:#bbb;
  font-size:.9rem;
  margin-bottom:12px;
}

.synopsis{
  color:#ddd;
  font-size:.95rem;
  line-height:1.7;
  margin:15px auto 5px;
  max-width:900px;
  text-align:center;
  white-space:pre-wrap;
}

#toggleSynopsis{
  display:none;
  margin:8px auto 15px;
  color:var(--accent);
  font-weight:bold;
  cursor:pointer;
  text-align:center;
  user-select:none;
  font-size:.9rem;
}

#toggleSynopsis:hover{
  opacity:.8;
}

.series-actions{
  display:flex;
  gap:24px;
  margin:16px 0;
}

.action-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:95px;
  padding:10px;
  border-radius:14px;
  background:#111;
  cursor:pointer;
  font-size:.8rem;
  color:#bbb;
  transition:.2s;
}

.action-btn.active{
  background:var(--accent);
  color:#fff;
}

#episodeTitle{
  font-size:1rem;
  margin-bottom:10px;
}

.scroll-episodes{
  width:100%;
  max-width:1000px;
  flex-grow:1;
  overflow-y:auto;
  padding:8px;
  padding-bottom:20px;
}

.episode-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.episode{
  background:var(--card);
  border-radius:14px;
  min-height:50px;
  background-size:cover;
  background-position:center;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  position:relative;
  overflow:hidden;
}

.episode::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.55);
}

.episode span{
  position:relative;
  z-index:2;
  padding:10px;
  text-align:center;
}

.episode.active,
.episode.last-watched{
  outline:2px solid var(--accent);
}

/* Modal */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}

.modal-overlay.active{
  opacity:1;
  pointer-events:all;
}

.modal{
  background:#1f1f1f;
  border-radius:16px;
  padding:35px 30px;
  max-width:400px;
  width:90%;
  text-align:center;
}

.modal h2{
  margin:0;
  color:#ff4d4d;
}

.modal p{
  color:#ccc;
}

.modal ul{
  text-align:left;
  color:#999;
}

.modal button{
  margin-top:20px;
  padding:12px 24px;
  background:#ff4d4d;
  border:none;
  border-radius:8px;
  color:#fff;
  opacity:.7;
}

/* Toast */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#28a745;
  color:#fff;
  padding:12px 20px;
  border-radius:8px;
  font-size:16px;
  opacity:0;
  transition:.4s;
  z-index:10000;
}

.toast.show{
  opacity:1;
}

/* Loading Screen */

#loadingScreen{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999999;
  transition:opacity .4s ease;
}

#loadingScreen.hide{
  opacity:0;
  pointer-events:none;
}

.spinner{
  width:70px;
  height:70px;
  border:4px solid rgba(255,255,255,.15);
  border-top:4px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

.loading-text{
  margin-top:15px;
  color:#fff;
  font-size:1.5rem;
}

@keyframes spin{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}
</style>
</head>

<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text">Cargando...</div>
</div>

<div class="header-fixed">

  <img class="banner-top" src="" id="banner">

  <img class="poster" id="poster">

  <div class="anime-info">

    <h1 id="animeTitle">Cargando...</h1>

    <div class="meta" id="animeMeta"></div>

    <p id="animeSynopsis" class="synopsis">
    Cargando sinopsis...
    </p>

    <div id="toggleSynopsis">
     Ver más
     </div>

  </div>

  <div class="series-actions">
    <div class="action-btn" id="favoriteBtn">❤️ Favoritos</div>
    <div class="action-btn" id="watchedBtn">✔ Finalizada</div>
  </div>

  <div id="episodeTitle">Selecciona un Episoddio</div>

</div>

<div class="scroll-episodes">
  <section class="episode-list" id="episodeList"></section>
</div>

<!-- Modal -->
<div class="modal-overlay" id="connectionModal">
  <div class="modal">
    <h2>Sin conexión</h2>
    <p>No se detecta acceso a Internet.</p>

    <ul>
      <li>Verifica tu Wi-Fi o datos móviles</li>
      <li>Conéctate a una red disponible</li>
      <li>Espera mientras se reconecta</li>
    </ul>

    <button disabled>Reconectando...</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  ✅ ¡Conexión restaurada!
</div>

<script>

/* ================= TMDB ================= */

const TMDB_API = "b6083b855479a79fd9acdb0a2789f126";

/* Anime */
const tmdbType = "tv";
const tmdbId = 109241;
/* Título personalizado */
const customTitle = "Succubus Stayed Life The Animation";

const customPoster = "";

/* Temporada */
const seasonNumber = 1;

/* ID local */
const seriesId = "Hentai121";

/* Tus links de video */
const videoLinks = [  
'https://cdn.hvidserv.com/m3u8/6d8803f8c6782a815da510cc22a3a26a',
'https://cdn.hvidserv.com/m3u8/2bc676e6a6c7f02a7a6c54a5db6bafaa'
];

/* ================= ELEMENTOS ================= */

const episodeList = document.getElementById('episodeList');
const episodeTitle = document.getElementById('episodeTitle');

const favBtn = document.getElementById('favoriteBtn');
const watchedBtn = document.getElementById('watchedBtn');
const currentPage = window.location.pathname;

const synopsis = document.getElementById("animeSynopsis");
const toggleSynopsis = document.getElementById("toggleSynopsis");

let fullSynopsis = "";
let synopsisExpanded = false;
  
  const loadingScreen =
  document.getElementById("loadingScreen");

function hideLoading(){

  if(!loadingScreen) return;

  loadingScreen.classList.add("hide");

  setTimeout(()=>{
    loadingScreen?.remove();
  },400);

}

let episodes = [];
let currentEpisode = localStorage.getItem(seriesId+'_lastEpisode');

currentEpisode = currentEpisode !== null
  ? parseInt(currentEpisode)
  : null;

/* ================= STORAGE ================= */

const getList = k =>
  JSON.parse(localStorage.getItem(k)) || [];

const saveList = (k,v) =>
  localStorage.setItem(k, JSON.stringify(v));

/* ================= FAVORITOS ================= */

function isFavorite(){
  return getList('favorites').some(s => s.id === seriesId);
}

function toggleFavorite(){

  let favs = getList('favorites');

  if(isFavorite()){

    favs = favs.filter(s => s.id !== seriesId);

    favBtn.classList.remove('active');

  }else{

    favs.push({
     id: seriesId,
     title:         document.getElementById("animeTitle").textContent,
     banner: document.getElementById("poster").src,
     page: currentPage
    });

    favBtn.classList.add('active');

  }

  saveList('favorites', favs);

}

/* ================= FINALIZADA ================= */

function toggleWatched(){

  let list = getList('watched');

  if(list.includes(seriesId)){

    list = list.filter(id => id !== seriesId);

    watchedBtn.classList.remove('active');

  }else{

    list.push(seriesId);

    watchedBtn.classList.add('active');

  }

  saveList('watched', list);

}

/* ================= CARGAR ANIME ================= */

async function loadAnime(){

  try{

    /* Obtener datos */

    const detailsReq = await fetch(
      `https://api.themoviedb.org/3/${tmdbType}/${tmdbId}?api_key=${TMDB_API}&language=es-ES`
    );

    const data = await detailsReq.json();

    /* Banner */
    document.getElementById("banner").src =
      `https://image.tmdb.org/t/p/original${data.backdrop_path}`;

    /* Poster */
    document.getElementById("poster").src =
  customPoster || `https://image.tmdb.org/t/p/w500${data.poster_path}`;

    /* Título personalizado */
document.getElementById("animeTitle").textContent =
  customTitle || data.name || data.title;
  
  /* Sinopsis */
  fullSynopsis = data.overview && data.overview.trim() !== ""
    ? data.overview
    : "No hay sinopsis disponible.";

if(fullSynopsis.length > 150){

    synopsis.textContent =
        fullSynopsis.substring(0,150) + "...";

    toggleSynopsis.style.display = "block";
    toggleSynopsis.textContent = "Ver más";

    synopsisExpanded = false;

}else{

    synopsis.textContent = fullSynopsis;

    toggleSynopsis.style.display = "none";

}

    /* Géneros */
    const genres = data.genres
  .map(g => g.name)
  .join(", ");

    /* ================= SERIES ================= */

    if(tmdbType === "tv"){

      const seasonReq = await fetch(
        `https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNumber}?api_key=${TMDB_API}&language=es-ES`
      );

      const seasonData = await seasonReq.json();
      
      const seasonYear =
  seasonData.air_date
    ? seasonData.air_date.split("-")[0]
    : "";

document.getElementById("animeMeta").innerHTML =
`
⭐ ${data.vote_average.toFixed(1)}
• ${seasonYear}
• ${genres}
• ${seasonData.episodes.length} Episodios
`;

      const episodiosDisponibles = seasonData.episodes.filter((ep, index) => {

  return (
    videoLinks[index] &&
    ep.air_date &&
    new Date(ep.air_date) <= new Date()
  );

});

episodes = episodiosDisponibles.map((ep, index) => ({

  title: `Episodio ${ep.episode_number}`,

  url: videoLinks[index],

  thumbnail: ep.still_path
    ? `https://image.tmdb.org/t/p/w500${ep.still_path}`
    : `https://image.tmdb.org/t/p/original${data.backdrop_path}`

}));

    }

    /* ================= PELÍCULAS ================= */

    else{

  const year =
    (data.release_date || "")
      .split("-")[0];

  document.getElementById("animeMeta").innerHTML =
  `
  ⭐ ${data.vote_average.toFixed(1)}
  • ${year}
  • ${genres}
  • ${data.runtime} Min
  `;

  episodes = [{

    title: "VER PELÍCULA",

    url: videoLinks[0] || '',

    thumbnail:
      `https://image.tmdb.org/t/p/original${data.backdrop_path}`

}];

}

    renderEpisodes();
    
    hideLoading();

  }catch(err){

    console.log(err);
    
    hideLoading();

    showToast("❌ Error cargando TMDb", "#ff4444");

  }

}

/* ================= RENDER ================= */

function renderEpisodes(){

  episodeList.innerHTML = '';

  episodes.forEach((ep,i)=>{

    const div = document.createElement('div');

    div.className='episode';

    div.style.backgroundImage=`url(${ep.thumbnail})`;

    div.innerHTML=`<span>${ep.title}</span>`;

    div.onclick=()=>loadEpisode(i);

    episodeList.appendChild(div);

  });

  updateUI();
  
  /* Scroll automático al último episodio visto */

  if(currentEpisode !== null && episodes[currentEpisode]){

    episodeTitle.textContent =
      episodes[currentEpisode].title;

    setTimeout(()=>{

      document.querySelectorAll('.episode')[currentEpisode]
        ?.scrollIntoView({
          behavior:'smooth',
          block:'center'
        });

    },1500);

  }

}

/* ================= REPRODUCIR ================= */

function loadEpisode(i){

  currentEpisode = i;

  episodeTitle.textContent = episodes[i].title;

  const url = episodes[i].url;

  if(url){

    Android.openEpisode(url);

  }else{

    showToast("❌ Episodio no disponible", "#ff4444");

  }

  localStorage.setItem(seriesId+'_lastEpisode', i);

  updateUI();

}

/* ================= UI ================= */

function updateUI(){

  document.querySelectorAll('.episode')
    .forEach((e,idx)=>{

      e.classList.toggle(
        'active',
        idx===currentEpisode
      );

      e.classList.toggle(
        'last-watched',
        idx===currentEpisode
      );

    });

}

/* ================= INIT ================= */

if(isFavorite())
  favBtn.classList.add('active');

if(getList('watched').includes(seriesId))
  watchedBtn.classList.add('active');

favBtn.onclick = toggleFavorite;

watchedBtn.onclick = toggleWatched;

/* Ver más / Ver menos de la sinopsis */

toggleSynopsis.onclick = ()=>{

    synopsisExpanded = !synopsisExpanded;

    if(synopsisExpanded){

        synopsis.textContent = fullSynopsis;
        toggleSynopsis.textContent = "Ver menos";

    }else{

        synopsis.textContent =
            fullSynopsis.substring(0,150) + "...";

        toggleSynopsis.textContent = "Ver más";

    }

};

loadAnime();

/* ================= CONEXIÓN ================= */

const modal = document.getElementById("connectionModal");

let wasOffline = false;

function updateConnectionStatus(){

  if(!navigator.onLine){

    modal.classList.add("active");

    wasOffline = true;

  }else{

    modal.classList.remove("active");

    if(wasOffline){

      showToast("✅ ¡Conexión restaurada!");

      wasOffline = false;

    }

  }

}

window.addEventListener(
  "load",
  updateConnectionStatus
);

window.addEventListener(
  "offline",
  updateConnectionStatus
);

window.addEventListener(
  "online",
  updateConnectionStatus
);

/* ================= TOAST ================= */

function showToast(message, color="#28a745"){

  const toast = document.getElementById("toast");

  toast.style.background = color;

  toast.textContent = message;

  toast.classList.add("show");

  setTimeout(()=>{

    toast.classList.remove("show");

  },3500);

}

/* ================= BLOQUEOS ================= */

document.addEventListener(
  "dragstart",
  e => e.preventDefault()
);

document.addEventListener(
  "selectstart",
  e => e.preventDefault()
);

</script>

</body>
</html>
